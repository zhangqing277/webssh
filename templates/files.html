<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络设备管理平台 - 文件管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: rgba(22, 33, 62, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 0 20px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .navbar-brand { font-size: 15px; font-weight: 600; }
        .navbar-actions { display: flex; gap: 12px; }
        .nav-btn {
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            background: transparent;
            color: #ccc;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }

        /* 工具栏 */
        .toolbar {
            background: rgba(22, 33, 62, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .path-bar {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            padding: 0 10px;
        }
        .path-bar input {
            flex: 1;
            border: none;
            background: transparent;
            color: #e0e0e0;
            padding: 8px;
            font-size: 13px;
            font-family: 'Consolas', monospace;
            outline: none;
        }
        .path-bar button {
            padding: 4px 10px;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
        }
        .path-bar button:hover { color: #fff; }
        .tool-btn {
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 5px;
            background: transparent;
            color: #aaa;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .tool-btn.primary { border-color: #4a9eff; color: #4a9eff; }
        .tool-btn.danger { border-color: #ef4444; color: #ef4444; }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        /* 文件列表 */
        .file-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .file-list-header {
            display: grid;
            grid-template-columns: 1fr 100px 150px 80px;
            padding: 10px 16px;
            background: rgba(22, 33, 62, 0.6);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 12px;
            color: #888;
            font-weight: 500;
        }
        .file-list {
            flex: 1;
            overflow-y: auto;
        }
        .file-item {
            display: grid;
            grid-template-columns: 1fr 100px 150px 80px;
            padding: 8px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            transition: background 0.15s;
        }
        .file-item:hover { background: rgba(255,255,255,0.05); }
        .file-item.selected { background: rgba(74,158,255,0.15); }
        .file-item .name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .file-item .icon {
            width: 18px;
            text-align: center;
        }
        .file-item .icon.dir { color: #f59e0b; }
        .file-item .icon.file { color: #888; }
        .file-item .size, .file-item .modified, .file-item .perms {
            font-size: 12px;
            color: #888;
        }

        /* 预览面板 */
        .preview-panel {
            width: 400px;
            background: rgba(22, 33, 62, 0.5);
            border-left: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .preview-panel.hidden { display: none; }
        .preview-header {
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
        }
        .preview-content {
            flex: 1;
            overflow: auto;
            padding: 12px;
        }
        .preview-content pre {
            font-family: 'Consolas', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .preview-content textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #e0e0e0;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            resize: none;
            outline: none;
        }

        /* 搜索 */
        .search-bar {
            display: none;
            padding: 10px 20px;
            background: rgba(22, 33, 62, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .search-bar.show { display: flex; gap: 10px; align-items: center; }
        .search-bar input {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 5px;
            background: rgba(255,255,255,0.08);
            color: #e0e0e0;
            font-size: 13px;
            outline: none;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.hidden { display: none; }
        .modal {
            background: #1e2a4a;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 24px;
            width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h3 { margin-bottom: 16px; font-size: 16px; }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            color: #aaa;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            background: rgba(255,255,255,0.08);
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: #4a9eff; }
        .modal-btns {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .modal-btn {
            padding: 8px 20px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            background: transparent;
            color: #ccc;
            font-size: 14px;
            cursor: pointer;
        }
        .modal-btn.primary {
            background: #4a9eff;
            border-color: #4a9eff;
            color: #fff;
        }

        /* 上传区域 */
        .upload-zone {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #4a9eff;
            background: rgba(74,158,255,0.1);
        }

        /* 右键菜单 */
        .context-menu {
            position: fixed;
            background: #1e2a4a;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 6px 0;
            min-width: 160px;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .context-menu.hidden { display: none; }
        .context-menu-item {
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .context-menu-item:hover { background: rgba(255,255,255,0.08); }
        .context-menu-item.danger { color: #ef4444; }
        .context-menu-divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 6px 0;
        }

        /* 状态栏 */
        .status-bar {
            background: rgba(22, 33, 62, 0.8);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 6px 20px;
            font-size: 12px;
            color: #888;
            display: flex;
            justify-content: space-between;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .loading::after {
            content: '';
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">网络设备管理平台 / 文件管理</div>
        <div class="navbar-actions">
            <a class="nav-btn" href="javascript:window.close()" onclick="if(!window.opener||window.opener.closed){location.href='/terminal'}">返回终端</a>
            <a class="nav-btn" href="/logout">退出</a>
        </div>
    </div>

    <div class="toolbar">
        <button class="tool-btn" onclick="goBack()" title="返回上级">← 返回</button>
        <button class="tool-btn" onclick="refreshList()" title="刷新">↻ 刷新</button>
        <div class="path-bar">
            <input type="text" id="current-path" value="/" onkeydown="if(event.key==='Enter')navigateTo(this.value)">
            <button onclick="navigateTo(document.getElementById('current-path').value)">→</button>
        </div>
        <button class="tool-btn" onclick="toggleSearch()">🔍 搜索</button>
        <button class="tool-btn primary" onclick="showUploadModal()">↑ 上传</button>
        <button class="tool-btn" onclick="showMkdirModal()">+ 新建文件夹</button>
        <button class="tool-btn" onclick="togglePreview()">预览</button>
    </div>

    <div class="search-bar" id="search-bar">
        <input type="text" id="search-input" placeholder="输入文件名搜索..." onkeydown="if(event.key==='Enter')searchFiles()">
        <button class="tool-btn" onclick="searchFiles()">搜索</button>
        <button class="tool-btn" onclick="toggleSearch()">取消</button>
    </div>

    <div class="main-content">
        <div class="file-panel">
            <div class="file-list-header">
                <span>名称</span>
                <span>大小</span>
                <span>修改时间</span>
                <span>权限</span>
            </div>
            <div class="file-list" id="file-list" oncontextmenu="showContextMenu(event)">
                <div class="loading"></div>
            </div>
        </div>

        <div class="preview-panel hidden" id="preview-panel">
            <div class="preview-header">
                <span id="preview-title">文件预览</span>
                <button class="tool-btn" onclick="togglePreview()">×</button>
            </div>
            <div class="preview-content" id="preview-content">
                <p style="color:#666;text-align:center;padding-top:40px;">选择文件查看内容</p>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span id="status-text">就绪</span>
        <span id="item-count">0 项</span>
    </div>

    <!-- 右键菜单 -->
    <div class="context-menu hidden" id="context-menu">
        <div class="context-menu-item" onclick="openItem()">打开</div>
        <div class="context-menu-item" onclick="downloadFile()">下载</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" onclick="showRenameModal()">重命名</div>
        <div class="context-menu-item" onclick="showStatModal()">属性</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item danger" onclick="deleteItem()">删除</div>
    </div>

    <!-- 新建文件夹模态框 -->
    <div class="modal-overlay hidden" id="mkdir-modal">
        <div class="modal">
            <h3>新建文件夹</h3>
            <div class="form-group">
                <label>文件夹名称</label>
                <input type="text" id="mkdir-name" placeholder="新文件夹">
            </div>
            <div class="modal-btns">
                <button class="modal-btn" onclick="hideModal('mkdir-modal')">取消</button>
                <button class="modal-btn primary" onclick="createDir()">创建</button>
            </div>
        </div>
    </div>

    <!-- 重命名模态框 -->
    <div class="modal-overlay hidden" id="rename-modal">
        <div class="modal">
            <h3>重命名</h3>
            <div class="form-group">
                <label>新名称</label>
                <input type="text" id="rename-name">
            </div>
            <div class="modal-btns">
                <button class="modal-btn" onclick="hideModal('rename-modal')">取消</button>
                <button class="modal-btn primary" onclick="renameItem()">确定</button>
            </div>
        </div>
    </div>

    <!-- 上传模态框 -->
    <div class="modal-overlay hidden" id="upload-modal">
        <div class="modal">
            <h3>上传文件</h3>
            <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
                <p>点击选择文件或拖拽文件到此处</p>
                <p style="font-size:12px;margin-top:8px;">支持任意类型文件</p>
            </div>
            <input type="file" id="file-input" style="display:none" onchange="handleFileSelect(event)" multiple>
            <div id="upload-list" style="margin-top:12px;"></div>
            <div class="modal-btns">
                <button class="modal-btn" onclick="hideModal('upload-modal')">关闭</button>
            </div>
        </div>
    </div>

    <!-- 属性模态框 -->
    <div class="modal-overlay hidden" id="stat-modal">
        <div class="modal">
            <h3>文件属性</h3>
            <div id="stat-content"></div>
            <div class="modal-btns">
                <button class="modal-btn primary" onclick="hideModal('stat-modal')">关闭</button>
            </div>
        </div>
    </div>

    <script>
        var currentPath = '/';
        var selectedItem = null;
        var fileList = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadFileList('/');
            setupDragDrop();

            // 点击其他地方隐藏右键菜单
            document.addEventListener('click', function() {
                document.getElementById('context-menu').classList.add('hidden');
            });

            // 键盘快捷键
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Delete' && selectedItem) {
                    deleteItem();
                }
                if (e.key === 'Escape') {
                    selectedItem = null;
                    renderFileList();
                }
            });
        });

        // 加载文件列表
        function loadFileList(path) {
            currentPath = path;
            document.getElementById('current-path').value = path;
            document.getElementById('file-list').innerHTML = '<div class="loading"></div>';

            fetch('/api/files/list?path=' + encodeURIComponent(path))
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        fileList = data.items;
                        renderFileList();
                        document.getElementById('item-count').textContent = data.items.length + ' 项';
                        document.getElementById('status-text').textContent = data.path;
                    } else {
                        document.getElementById('file-list').innerHTML =
                            '<div class="empty-state"><p>' + data.error + '</p></div>';
                    }
                })
                .catch(err => {
                    document.getElementById('file-list').innerHTML =
                        '<div class="empty-state"><p>加载失败: ' + err.message + '</p></div>';
                });
        }

        // 渲染文件列表
        function renderFileList() {
            var container = document.getElementById('file-list');

            if (fileList.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>空文件夹</p></div>';
                return;
            }

            container.innerHTML = fileList.map(item => {
                var icon = item.is_dir ? '📁' : '📄';
                var selected = selectedItem && selectedItem.path === item.path ? 'selected' : '';
                var size = item.is_dir ? '-' : formatSize(item.size);

                return '<div class="file-item ' + selected + '" data-path="' + escapeHtml(item.path) +
                       '" data-isdir="' + item.is_dir + '" onclick="selectItem(this)" ' +
                       'ondblclick="openItem()">' +
                       '<div class="name"><span class="icon ' + (item.is_dir ? 'dir' : 'file') + '">' + icon + '</span>' +
                       escapeHtml(item.name) + '</div>' +
                       '<div class="size">' + size + '</div>' +
                       '<div class="modified">' + item.modified + '</div>' +
                       '<div class="perms">' + item.permissions + '</div></div>';
            }).join('');
        }

        // 选择项目
        function selectItem(el) {
            document.querySelectorAll('.file-item').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedItem = {
                path: el.dataset.path,
                isDir: el.dataset.isdir === 'true'
            };

            // 如果是文件，预览内容
            if (!selectedItem.isDir) {
                previewFile(selectedItem.path);
            }
        }

        // 打开项目
        function openItem() {
            if (!selectedItem) return;

            if (selectedItem.isDir) {
                loadFileList(selectedItem.path);
                selectedItem = null;
            } else {
                // 文件：下载或预览
                downloadFile();
            }
        }

        // 预览文件
        function previewFile(path) {
            var panel = document.getElementById('preview-panel');
            if (panel.classList.contains('hidden')) return;

            document.getElementById('preview-title').textContent = '加载中...';
            document.getElementById('preview-content').innerHTML = '<div class="loading"></div>';

            fetch('/api/files/read?path=' + encodeURIComponent(path))
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        var name = path.split('/').pop();
                        document.getElementById('preview-title').textContent = name;

                        if (data.is_binary) {
                            document.getElementById('preview-content').innerHTML =
                                '<p style="color:#888;text-align:center;padding:20px;">二进制文件，请下载查看</p>';
                        } else {
                            document.getElementById('preview-content').innerHTML =
                                '<pre>' + escapeHtml(data.content) + '</pre>';
                        }
                    } else {
                        document.getElementById('preview-content').innerHTML =
                            '<p style="color:#f87171;">' + data.error + '</p>';
                    }
                });
        }

        // 切换预览面板
        function togglePreview() {
            document.getElementById('preview-panel').classList.toggle('hidden');
        }

        // 导航
        function navigateTo(path) {
            loadFileList(path);
        }

        function goBack() {
            var parts = currentPath.split('/').filter(p => p);
            parts.pop();
            loadFileList('/' + parts.join('/'));
        }

        function refreshList() {
            loadFileList(currentPath);
        }

        // 搜索
        function toggleSearch() {
            document.getElementById('search-bar').classList.toggle('show');
        }

        function searchFiles() {
            var pattern = document.getElementById('search-input').value.trim();
            if (!pattern) return;

            document.getElementById('file-list').innerHTML = '<div class="loading"></div>';

            fetch('/api/files/search?path=' + encodeURIComponent(currentPath) +
                  '&pattern=' + encodeURIComponent(pattern))
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        fileList = data.items;
                        renderFileList();
                        document.getElementById('status-text').textContent =
                            '搜索结果: ' + data.items.length + ' 项';
                    } else {
                        document.getElementById('file-list').innerHTML =
                            '<div class="empty-state"><p>' + data.error + '</p></div>';
                    }
                });
        }

        // 右键菜单
        function showContextMenu(e) {
            e.preventDefault();
            var menu = document.getElementById('context-menu');
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
            menu.classList.remove('hidden');
        }

        // 下载
        function downloadFile() {
            if (!selectedItem || selectedItem.isDir) return;
            window.open('/api/files/download?path=' + encodeURIComponent(selectedItem.path), '_blank');
        }

        // 删除
        function deleteItem() {
            if (!selectedItem) return;
            if (!confirm('确定要删除 "' + selectedItem.path.split('/').pop() + '" 吗？')) return;

            fetch('/api/files/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({path: selectedItem.path})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    refreshList();
                    selectedItem = null;
                } else {
                    alert('删除失败: ' + data.error);
                }
            });
        }

        // 新建文件夹
        function showMkdirModal() {
            document.getElementById('mkdir-name').value = '';
            document.getElementById('mkdir-modal').classList.remove('hidden');
        }

        function createDir() {
            var name = document.getElementById('mkdir-name').value.trim();
            if (!name) return;

            var path = currentPath === '/' ? '/' + name : currentPath + '/' + name;

            fetch('/api/files/mkdir', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({path: path})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    hideModal('mkdir-modal');
                    refreshList();
                } else {
                    alert('创建失败: ' + data.error);
                }
            });
        }

        // 重命名
        function showRenameModal() {
            if (!selectedItem) return;
            document.getElementById('rename-name').value = selectedItem.path.split('/').pop();
            document.getElementById('rename-modal').classList.remove('hidden');
        }

        function renameItem() {
            if (!selectedItem) return;
            var newName = document.getElementById('rename-name').value.trim();
            if (!newName) return;

            fetch('/api/files/rename', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({old_path: selectedItem.path, new_name: newName})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    hideModal('rename-modal');
                    refreshList();
                    selectedItem = null;
                } else {
                    alert('重命名失败: ' + data.error);
                }
            });
        }

        // 属性
        function showStatModal() {
            if (!selectedItem) return;

            fetch('/api/files/stat?path=' + encodeURIComponent(selectedItem.path))
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        var html = '<div style="font-size:13px;line-height:2;">' +
                            '<p><strong>名称:</strong> ' + escapeHtml(data.name) + '</p>' +
                            '<p><strong>路径:</strong> ' + escapeHtml(data.path) + '</p>' +
                            '<p><strong>类型:</strong> ' + (data.is_dir ? '目录' : '文件') + '</p>' +
                            '<p><strong>大小:</strong> ' + formatSize(data.size) + '</p>' +
                            '<p><strong>权限:</strong> ' + data.permissions + '</p>' +
                            '<p><strong>修改时间:</strong> ' + data.modified + '</p>' +
                            '<p><strong>访问时间:</strong> ' + data.accessed + '</p>' +
                            '</div>';
                        document.getElementById('stat-content').innerHTML = html;
                        document.getElementById('stat-modal').classList.remove('hidden');
                    }
                });
        }

        // 上传
        function showUploadModal() {
            document.getElementById('upload-list').innerHTML = '';
            document.getElementById('upload-modal').classList.remove('hidden');
        }

        function setupDragDrop() {
            var zone = document.getElementById('upload-zone');

            zone.addEventListener('dragover', function(e) {
                e.preventDefault();
                zone.classList.add('dragover');
            });

            zone.addEventListener('dragleave', function() {
                zone.classList.remove('dragover');
            });

            zone.addEventListener('drop', function(e) {
                e.preventDefault();
                zone.classList.remove('dragover');
                uploadFiles(e.dataTransfer.files);
            });
        }

        function handleFileSelect(e) {
            uploadFiles(e.target.files);
        }

        function uploadFiles(files) {
            var list = document.getElementById('upload-list');
            var completed = 0;

            Array.from(files).forEach(file => {
                var item = document.createElement('div');
                item.style.cssText = 'padding:8px;background:rgba(255,255,255,0.05);border-radius:4px;margin-bottom:6px;font-size:13px;';
                item.innerHTML = escapeHtml(file.name) + ' <span style="color:#888;">上传中...</span>';
                list.appendChild(item);

                var formData = new FormData();
                formData.append('file', file);
                formData.append('path', currentPath);

                fetch('/api/files/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        item.innerHTML = escapeHtml(file.name) + ' <span style="color:#22c55e;">完成</span>';
                        completed++;
                        if (completed === files.length) {
                            setTimeout(function() {
                                hideModal('upload-modal');
                                refreshList();
                            }, 1000);
                        }
                    } else {
                        item.innerHTML = escapeHtml(file.name) + ' <span style="color:#ef4444;">失败: ' + data.error + '</span>';
                    }
                });
            });
        }

        // 工具函数
        function hideModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function escapeHtml(text) {
            var map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            var units = ['B', 'KB', 'MB', 'GB', 'TB'];
            var i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络设备管理平台 - 设备管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(22, 33, 62, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 0 20px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar-brand {
            font-size: 15px;
            font-weight: 600;
            color: #e0e0e0;
        }
        .navbar-actions {
            display: flex;
            gap: 12px;
        }
        .nav-btn {
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            background: transparent;
            color: #ccc;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .nav-btn.primary {
            background: #4a9eff;
            border-color: #4a9eff;
            color: #fff;
        }

        .content {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .page-title {
            font-size: 22px;
            font-weight: 600;
        }
        .btn {
            padding: 8px 18px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            background: transparent;
            color: #ccc;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: rgba(255,255,255,0.08); }
        .btn.primary {
            background: #4a9eff;
            border-color: #4a9eff;
            color: #fff;
        }
        .btn.primary:hover { background: #3b82f6; }

        /* 分组筛选 */
        .group-filter {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .group-btn {
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            background: transparent;
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
        }
        .group-btn.active {
            background: #4a9eff;
            border-color: #4a9eff;
            color: #fff;
        }

        /* 设备表格 */
        .devices-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            overflow: hidden;
        }
        .devices-table th {
            background: rgba(22, 33, 62, 0.8);
            padding: 14px 16px;
            text-align: left;
            font-weight: 500;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .devices-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        .devices-table tr:last-child td {
            border-bottom: none;
        }
        .devices-table tr:hover {
            background: rgba(255,255,255,0.03);
        }
        .device-name {
            font-weight: 500;
            color: #c8e0ff;
        }
        .device-host {
            color: #888;
            font-family: 'Consolas', monospace;
        }
        .device-group {
            background: rgba(74,158,255,0.15);
            color: #4a9eff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }
        .action-btn {
            padding: 4px 10px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            background: transparent;
            color: #aaa;
            font-size: 12px;
            cursor: pointer;
            margin-right: 6px;
        }
        .action-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .action-btn.connect {
            border-color: #22c55e;
            color: #22c55e;
        }
        .action-btn.edit {
            border-color: #f59e0b;
            color: #f59e0b;
        }
        .action-btn.delete {
            border-color: #ef4444;
            color: #ef4444;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.hidden { display: none; }
        .modal {
            background: #1e2a4a;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 28px;
            width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h3 {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: #aaa;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            background: rgba(255,255,255,0.08);
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #4a9eff;
        }
        .form-row {
            display: flex;
            gap: 12px;
        }
        .form-row .form-group { flex: 1; }
        .modal-btns {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        .modal-btn {
            padding: 8px 20px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            background: transparent;
            color: #ccc;
            font-size: 14px;
            cursor: pointer;
        }
        .modal-btn.primary {
            background: #4a9eff;
            border-color: #4a9eff;
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state p {
            margin-top: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">网络设备管理平台 / 设备管理</div>
        <div class="navbar-actions">
            <a class="nav-btn" href="/terminal" target="_blank">终端</a>
            <button class="nav-btn primary" onclick="showAddDeviceModal()">添加设备</button>
            <a class="nav-btn" href="/logout">退出</a>
        </div>
    </div>

    <div class="content">
        <div class="page-header">
            <h2 class="page-title">设备列表</h2>
        </div>

        <div class="group-filter" id="group-filter">
            <button class="group-btn active" data-group="">全部</button>
        </div>

        <table class="devices-table" id="devices-table">
            <thead>
                <tr>
                    <th>设备名称</th>
                    <th>地址</th>
                    <th>协议</th>
                    <th>分组</th>
                    <th>最后连接</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="devices-body">
                <tr><td colspan="6" class="empty-state"><p>加载中...</p></td></tr>
            </tbody>
        </table>
    </div>

    <!-- 添加/编辑设备模态框 -->
    <div class="modal-overlay hidden" id="device-modal">
        <div class="modal">
            <h3 id="modal-title">添加设备</h3>
            <div class="form-group">
                <label>设备名称 *</label>
                <input type="text" id="device-name" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>主机地址 *</label>
                    <input type="text" id="device-host" placeholder="IP地址或域名" required>
                </div>
                <div class="form-group">
                    <label>端口</label>
                    <input type="number" id="device-port" value="22">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>协议</label>
                    <select id="device-protocol">
                        <option value="ssh">SSH</option>
                        <option value="telnet">Telnet</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>分组</label>
                    <input type="text" id="device-group" placeholder="例如: 核心交换机">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="device-username">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="device-password">
                </div>
            </div>
            <div class="form-group">
                <label>描述</label>
                <textarea id="device-description" rows="2"></textarea>
            </div>
            <div class="modal-btns">
                <button class="modal-btn" onclick="hideDeviceModal()">取消</button>
                <button class="modal-btn primary" onclick="saveDevice()">保存</button>
            </div>
        </div>
    </div>

    <script>
        var currentDevices = [];
        var currentGroups = [];
        var editingDeviceId = null;

        // 加载设备列表
        function loadDevices(group='') {
            fetch(`/api/devices?group=${encodeURIComponent(group)}`)
                .then(r => r.json())
                .then(data => {
                    currentDevices = data.devices || [];
                    currentGroups = data.groups || [];
                    renderDevices();
                    renderGroupFilter();
                })
                .catch(err => {
                    console.error('加载设备失败:', err);
                    document.getElementById('devices-body').innerHTML = 
                        '<tr><td colspan="6" class="empty-state"><p>加载失败</p></td></tr>';
                });
        }

        // 渲染设备列表
        function renderDevices() {
            var tbody = document.getElementById('devices-body');
            if (currentDevices.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><p>暂无设备</p></td></tr>';
                return;
            }

            tbody.innerHTML = currentDevices.map(device => `
                <tr>
                    <td>
                        <div class="device-name">${escapeHtml(device.name)}</div>
                    </td>
                    <td>
                        <div class="device-host">${escapeHtml(device.host)}:${device.port}</div>
                    </td>
                    <td>${device.protocol.toUpperCase()}</td>
                    <td>${device.group ? `<span class="device-group">${escapeHtml(device.group)}</span>` : '-'}</td>
                    <td>${device.last_connected ? formatDate(device.last_connected) : '-'}</td>
                    <td>
                        <button class="action-btn connect" onclick="connectToDevice('${device.id}')">连接</button>
                        <button class="action-btn edit" onclick="editDevice('${device.id}')">编辑</button>
                        <button class="action-btn delete" onclick="deleteDevice('${device.id}')">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // 渲染分组筛选
        function renderGroupFilter() {
            var container = document.getElementById('group-filter');
            var html = '<button class="group-btn active" data-group="">全部</button>';
            currentGroups.forEach(group => {
                html += `<button class="group-btn" data-group="${escapeHtml(group)}">${escapeHtml(group)}</button>`;
            });
            container.innerHTML = html;

            // 绑定事件
            container.querySelectorAll('.group-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    container.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    loadDevices(this.dataset.group);
                });
            });
        }

        // 连接到设备（在新标签页打开终端）
        function connectToDevice(deviceId) {
            localStorage.setItem('connect_device_id', deviceId);
            // 如果当前页面已经是从终端打开的新标签，直接关闭并让终端连接
            // 否则新开终端页
            var terminalWin = window.opener;
            if (terminalWin && !terminalWin.closed) {
                // 通知已有的终端页连接设备
                terminalWin.focus();
                terminalWin.connectToDevice && terminalWin.connectToDevice(deviceId);
                window.close();
            } else {
                window.open('/terminal', '_blank');
            }
        }

        // 显示添加设备模态框
        function showAddDeviceModal() {
            editingDeviceId = null;
            document.getElementById('modal-title').textContent = '添加设备';
            document.getElementById('device-name').value = '';
            document.getElementById('device-host').value = '';
            document.getElementById('device-port').value = '22';
            document.getElementById('device-protocol').value = 'ssh';
            document.getElementById('device-group').value = '';
            document.getElementById('device-username').value = '';
            document.getElementById('device-password').value = '';
            document.getElementById('device-description').value = '';
            document.getElementById('device-modal').classList.remove('hidden');
        }

        // 编辑设备
        function editDevice(deviceId) {
            editingDeviceId = deviceId;
            document.getElementById('modal-title').textContent = '编辑设备';

            fetch(`/api/devices/${deviceId}`)
                .then(r => r.json())
                .then(device => {
                    document.getElementById('device-name').value = device.name;
                    document.getElementById('device-host').value = device.host;
                    document.getElementById('device-port').value = device.port;
                    document.getElementById('device-protocol').value = device.protocol;
                    document.getElementById('device-group').value = device.group || '';
                    document.getElementById('device-username').value = device.username || '';
                    document.getElementById('device-password').value = device.password || '';
                    document.getElementById('device-description').value = device.description || '';
                    document.getElementById('device-modal').classList.remove('hidden');
                });
        }

        // 保存设备
        function saveDevice() {
            var data = {
                name: document.getElementById('device-name').value.trim(),
                host: document.getElementById('device-host').value.trim(),
                port: parseInt(document.getElementById('device-port').value) || 22,
                protocol: document.getElementById('device-protocol').value,
                group: document.getElementById('device-group').value.trim(),
                username: document.getElementById('device-username').value.trim(),
                password: document.getElementById('device-password').value,
                description: document.getElementById('device-description').value.trim()
            };

            if (!data.name || !data.host) {
                alert('请填写必填项');
                return;
            }

            var url = '/api/devices';
            var method = 'POST';
            if (editingDeviceId) {
                url += '/' + editingDeviceId;
                method = 'PUT';
            }

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(result => {
                if (result.error) {
                    alert('保存失败: ' + result.error);
                } else {
                    hideDeviceModal();
                    loadDevices();
                }
            })
            .catch(err => {
                alert('请求失败: ' + err.message);
            });
        }

        // 删除设备
        function deleteDevice(deviceId) {
            if (!confirm('确定要删除这个设备吗？')) return;

            fetch(`/api/devices/${deviceId}`, {
                method: 'DELETE'
            })
            .then(r => r.json())
            .then(result => {
                if (result.error) {
                    alert('删除失败: ' + result.error);
                } else {
                    loadDevices();
                }
            });
        }

        // 隐藏模态框
        function hideDeviceModal() {
            document.getElementById('device-modal').classList.add('hidden');
        }

        // 工具函数
        function escapeHtml(text) {
            var map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        function formatDate(isoString) {
            var date = new Date(isoString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadDevices();
        });

        // 点击模态框外部关闭
        document.getElementById('device-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                hideDeviceModal();
            }
        });
    </script>
</body>
</html>
